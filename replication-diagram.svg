<svg width="760" height="456" viewBox="0 0 760 456" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="ag" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#00ff9f"/>
    </marker>
    <marker id="ac" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#00d9ff"/>
    </marker>
    <marker id="agr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#444"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="760" height="456" rx="12" fill="#111111"/>

  <!-- Title -->
  <text x="380" y="30" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="14" font-weight="700" fill="#00ff9f">
    Como Funciona a Replicação de Storage
  </text>

  <!-- Vertical divider -->
  <line x1="380" y1="44" x2="380" y2="360" stroke="#222" stroke-width="1"/>

  <!-- ═══════════════════════════════════════
       LEFT PANEL — Síncrona
  ═══════════════════════════════════════ -->

  <!-- Panel title + badge -->
  <text x="190" y="60" text-anchor="middle"
        font-family="'Segoe UI',sans-serif" font-size="13" font-weight="600" fill="#00ff9f">
    Síncrona
  </text>
  <rect x="144" y="66" width="92" height="19" rx="9"
        fill="rgba(0,255,159,0.08)" stroke="rgba(0,255,159,0.3)" stroke-width="1"/>
  <text x="190" y="79" text-anchor="middle"
        font-family="'Segoe UI',sans-serif" font-size="10" fill="#00ff9f">RPO = Zero</text>

  <!-- Actor labels -->
  <text x="58"  y="104" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="10" fill="#555">App</text>
  <text x="190" y="104" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="10" fill="#555">Primário</text>
  <text x="330" y="104" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="10" fill="#555">Secundário</text>

  <!-- Actor boxes -->
  <rect x="28"  y="106" width="60" height="26" rx="5" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <text x="58"  y="123" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="10" fill="#c0c0c0">App</text>

  <rect x="152" y="106" width="76" height="26" rx="5" fill="#1a1a1a" stroke="#00ff9f" stroke-width="1.5"/>
  <text x="190" y="123" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="10" fill="#00ff9f">Primário</text>

  <rect x="300" y="106" width="62" height="26" rx="5" fill="#1a1a1a" stroke="#444" stroke-width="1"/>
  <text x="331" y="123" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="10" fill="#888">Secundário</text>

  <!-- Lifelines -->
  <line x1="58"  y1="132" x2="58"  y2="284" stroke="#2a2a2a" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="190" y1="132" x2="190" y2="284" stroke="#2a2a2a" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="331" y1="132" x2="331" y2="284" stroke="#2a2a2a" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Step 1: App → Primary (write) -->
  <text x="20" y="154" font-family="'Segoe UI',sans-serif" font-size="9" fill="#444">1</text>
  <line x1="62"  y1="152" x2="186" y2="152" stroke="#00ff9f" stroke-width="1.5" marker-end="url(#ag)"/>
  <text x="124" y="147" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="9" fill="#666">write</text>

  <!-- Step 2: Primary → Secondary -->
  <text x="20" y="184" font-family="'Segoe UI',sans-serif" font-size="9" fill="#444">2</text>
  <line x1="194" y1="182" x2="327" y2="182" stroke="#00ff9f" stroke-width="1.5" marker-end="url(#ag)"/>
  <text x="261" y="177" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="9" fill="#666">encaminha bloco</text>

  <!-- Step 3: Secondary → Primary (ACK) -->
  <text x="20" y="214" font-family="'Segoe UI',sans-serif" font-size="9" fill="#444">3</text>
  <line x1="327" y1="212" x2="194" y2="212" stroke="#00d9ff" stroke-width="1.5" marker-end="url(#ac)"/>
  <text x="261" y="207" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="9" fill="#666">ACK secundário</text>

  <!-- Step 4: Primary → App (ACK) -->
  <text x="20" y="246" font-family="'Segoe UI',sans-serif" font-size="9" fill="#444">4</text>
  <line x1="186" y1="244" x2="62"  y2="244" stroke="#00d9ff" stroke-width="1.5" marker-end="url(#ac)"/>
  <text x="124" y="239" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="9" fill="#666">confirmação</text>

  <!-- Note box -->
  <rect x="20" y="268" width="350" height="52" rx="6"
        fill="rgba(0,0,0,0.3)" stroke="rgba(0,255,159,0.1)" stroke-width="1"/>
  <text x="195" y="286" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="10" fill="#666">
    App aguarda confirmação de ambos os sites.
  </text>
  <text x="195" y="300" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="10" fill="#666">
    Latência aumenta, mas
  </text>
  <text x="195" y="314" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="10" fill="#00ff9f">
    nenhum dado é perdido em caso de falha.
  </text>

  <!-- ═══════════════════════════════════════
       RIGHT PANEL — Assíncrona
  ═══════════════════════════════════════ -->

  <!-- Panel title + badge -->
  <text x="570" y="60" text-anchor="middle"
        font-family="'Segoe UI',sans-serif" font-size="13" font-weight="600" fill="#00ff9f">
    Assíncrona
  </text>
  <rect x="506" y="66" width="128" height="19" rx="9"
        fill="rgba(0,255,159,0.08)" stroke="rgba(0,255,159,0.3)" stroke-width="1"/>
  <text x="570" y="79" text-anchor="middle"
        font-family="'Segoe UI',sans-serif" font-size="10" fill="#00ff9f">RPO = minutos / horas</text>

  <!-- Actor labels -->
  <text x="436" y="104" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="10" fill="#555">App</text>
  <text x="570" y="104" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="10" fill="#555">Primário</text>
  <text x="712" y="104" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="10" fill="#555">Secundário</text>

  <!-- Actor boxes -->
  <rect x="406" y="106" width="60" height="26" rx="5" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <text x="436" y="123" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="10" fill="#c0c0c0">App</text>

  <rect x="532" y="106" width="76" height="26" rx="5" fill="#1a1a1a" stroke="#00ff9f" stroke-width="1.5"/>
  <text x="570" y="123" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="10" fill="#00ff9f">Primário</text>

  <rect x="682" y="106" width="62" height="26" rx="5" fill="#1a1a1a" stroke="#444" stroke-width="1"/>
  <text x="713" y="123" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="10" fill="#888">Secundário</text>

  <!-- Lifelines -->
  <line x1="436" y1="132" x2="436" y2="284" stroke="#2a2a2a" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="570" y1="132" x2="570" y2="284" stroke="#2a2a2a" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="713" y1="132" x2="713" y2="284" stroke="#2a2a2a" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Step 1: App → Primary (write) -->
  <text x="396" y="154" font-family="'Segoe UI',sans-serif" font-size="9" fill="#444">1</text>
  <line x1="440" y1="152" x2="566" y2="152" stroke="#00ff9f" stroke-width="1.5" marker-end="url(#ag)"/>
  <text x="503" y="147" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="9" fill="#666">write</text>

  <!-- Step 2: Primary → App (immediate ACK) -->
  <text x="396" y="184" font-family="'Segoe UI',sans-serif" font-size="9" fill="#444">2</text>
  <line x1="566" y1="182" x2="440" y2="182" stroke="#00d9ff" stroke-width="1.5" marker-end="url(#ac)"/>
  <text x="503" y="177" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="9" fill="#666">confirmação imediata</text>

  <!-- Time gap dashed line -->
  <line x1="396" y1="200" x2="744" y2="200" stroke="#252525" stroke-width="1" stroke-dasharray="5,4"/>
  <text x="570" y="213" text-anchor="middle"
        font-family="'Segoe UI',sans-serif" font-size="9" fill="#383838">lag de replicação</text>

  <!-- Step 3: Primary → Secondary (background) -->
  <text x="396" y="238" font-family="'Segoe UI',sans-serif" font-size="9" fill="#444">3</text>
  <line x1="574" y1="236" x2="709" y2="236" stroke="#555" stroke-width="1.5"
        stroke-dasharray="5,3" marker-end="url(#agr)"/>
  <text x="642" y="231" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="9" fill="#555">replica em background</text>

  <!-- Secondary → Primary (silent ACK) -->
  <line x1="709" y1="252" x2="574" y2="252" stroke="#333" stroke-width="1"
        stroke-dasharray="3,2"/>
  <text x="642" y="247" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="9" fill="#404040">ACK (não bloqueia App)</text>

  <!-- Note box -->
  <rect x="400" y="268" width="350" height="52" rx="6"
        fill="rgba(0,0,0,0.3)" stroke="rgba(0,255,159,0.1)" stroke-width="1"/>
  <text x="575" y="286" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="10" fill="#666">
    App confirmado sem esperar o secundário.
  </text>
  <text x="575" y="300" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="10" fill="#666">
    Sem impacto na latência, mas
  </text>
  <text x="575" y="314" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="10" fill="#00d9ff">
    dados do lag podem ser perdidos em falhas.
  </text>

  <!-- ═══════════════════════════════════════
       FOOTER — Comparativo
  ═══════════════════════════════════════ -->
  <line x1="16" y1="336" x2="744" y2="336" stroke="#1e1e1e" stroke-width="1"/>

  <!-- Three comparison columns -->
  <!-- Síncrona -->
  <text x="126" y="356" text-anchor="middle"
        font-family="'Segoe UI',sans-serif" font-size="11" font-weight="600" fill="#00ff9f">Síncrona</text>
  <text x="126" y="371" text-anchor="middle"
        font-family="'Segoe UI',sans-serif" font-size="10" fill="#555">RPO: zero · Dist: ≤ 200 km</text>

  <!-- Near-Sync -->
  <text x="380" y="356" text-anchor="middle"
        font-family="'Segoe UI',sans-serif" font-size="11" font-weight="600" fill="#00d9ff">Near-Sync</text>
  <text x="380" y="371" text-anchor="middle"
        font-family="'Segoe UI',sans-serif" font-size="10" fill="#555">RPO: segundos · Dist: ≤ 500 km</text>

  <!-- Assíncrona -->
  <text x="634" y="356" text-anchor="middle"
        font-family="'Segoe UI',sans-serif" font-size="11" font-weight="600" fill="#00ff9f">Assíncrona</text>
  <text x="634" y="371" text-anchor="middle"
        font-family="'Segoe UI',sans-serif" font-size="10" fill="#555">RPO: min/h · Dist: ilimitada</text>

  <!-- Column separators -->
  <line x1="253" y1="341" x2="253" y2="382" stroke="#1e1e1e" stroke-width="1"/>
  <line x1="507" y1="341" x2="507" y2="382" stroke="#1e1e1e" stroke-width="1"/>

  <!-- Footer note -->
  <line x1="16" y1="386" x2="744" y2="386" stroke="#1a1a1a" stroke-width="1"/>
  <text x="380" y="406" text-anchor="middle"
        font-family="'Segoe UI',sans-serif" font-size="10" fill="#3a3a3a">
    A escolha depende do RPO/RTO exigido pelo negócio, distância entre os sites e budget disponível.
  </text>

  <!-- Legend -->
  <line x1="30"  y1="428" x2="60"  y2="428" stroke="#00ff9f" stroke-width="1.5" marker-end="url(#ag)"/>
  <text x="66"   y="432" font-family="'Segoe UI',sans-serif" font-size="10" fill="#555">Fluxo síncrono (bloqueante)</text>

  <line x1="240" y1="428" x2="270" y2="428" stroke="#00d9ff" stroke-width="1.5" marker-end="url(#ac)"/>
  <text x="276"  y="432" font-family="'Segoe UI',sans-serif" font-size="10" fill="#555">Confirmação (ACK)</text>

  <line x1="430" y1="428" x2="460" y2="428" stroke="#555" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#agr)"/>
  <text x="466"  y="432" font-family="'Segoe UI',sans-serif" font-size="10" fill="#555">Replicação em background</text>
</svg>
